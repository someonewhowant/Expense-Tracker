<li [ngClass]="transaction.amount < 0 ? 'minus' : 'plus'">
  <span class="text">{{ transaction.text }}</span>
  <span class="amount">
    {{ transaction.amount < 0 ? '-' : '+' }}${{ (transaction.amount < 0 ? -transaction.amount : transaction.amount) |
      formatNumber }} </span>
      <button (click)="onDelete()" class="delete-btn" aria-label="Delete transaction">&times;</button>
</li>
